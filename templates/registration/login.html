{% extends "base.html" %}
{% block title %}Log in — Chess Trainer{% endblock %}
{% block content %}
<div class="login-box">
  <h1>Chess Trainer</h1>
  {% if form.errors %}<p class="error">Wrong username or password.</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    <label>Username {{ form.username }}</label>
    <label>Password {{ form.password }}</label>
    <button type="submit">Log in</button>
    <input type="hidden" name="next" value="{{ next }}">
  </form>
</div>
{% endblock %}
