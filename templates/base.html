{% load static %}<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Chess Trainer{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'vendor/chessground.base.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/chessground.brown.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/chessground.cburnett.css' %}">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <nav>
    <a href="/train/">Train</a>
    <a href="/dashboard/">Dashboard</a>
    <a href="/openings/">Openings</a>
    <a href="/puzzles/">Puzzles</a>
    <a href="/games/">Games</a>
    {% if user.is_authenticated %}
    <form method="post" action="{% url 'logout' %}" class="logout">
      {% csrf_token %}<button type="submit">Log out</button>
    </form>
    {% endif %}
  </nav>
  <main>{% block content %}{% endblock %}</main>
  {% block scripts %}{% endblock %}
</body>
</html>
