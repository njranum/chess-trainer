[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["test_*.py"]
markers = [
    "engine: needs a real Stockfish binary (STOCKFISH_PATH); excluded from plain unit runs",
]

[tool.ruff]
line-length = 99
target-version = "py313"
# models.py: the designed-schema starting point — split across apps and
# deleted in M1-04..M1-06, so not linted as live code.
exclude = ["**/migrations/*", "models.py"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "DJ"]
